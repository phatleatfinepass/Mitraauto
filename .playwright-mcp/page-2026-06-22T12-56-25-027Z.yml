                - heading "1. Controller, Scope, and Contact Information" [level=2] [ref=e81]
                - paragraph [ref=e82]: This Privacy Policy explains how Mitra Auto Oy processes personal data on the website, booking service, workshop and tire services, Rescue 24/7, webshop, payments, customer support, CMS administration, Account & Customer system, customer PWA, customer accounts, customer benefits, reminders, and digital service book.
                - paragraph [ref=e83]: This policy applies to consumer customers, contacts of business and fleet customers, customer account users, webshop users, emergency service users, job applicants where they contact us through the service, and other persons whose data is processed in Mitra Auto services.
                - list [ref=e84]:
