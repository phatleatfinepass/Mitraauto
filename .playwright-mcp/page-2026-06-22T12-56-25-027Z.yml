              - generic [ref=e97]:
                - heading "2. Services and Systems Covered" [level=2] [ref=e98]
                - paragraph [ref=e99]: Mitra Auto uses digital systems to receive, provide, track, and manage services and customer data. Account & Customer is part of the staff administration system used to maintain customer, vehicle, license plate, booking, order, receipt, emergency service, service history, reminder, and customer benefit data.
                - paragraph [ref=e100]: The customer PWA is the customer-facing view where a customer may see vehicles, upcoming appointments, possible service dates, pickup and handover details, digital service book, reminders, customer benefits, and contact details connected to the account.
                - list [ref=e101]:
                  - listitem [ref=e102]: Website and contact forms.
                  - listitem [ref=e103]: Booking, service intake, work orders, pickup, and handover.
                  - listitem [ref=e104]: Webshop, orders, payments, invoices, and receipts.
                  - listitem [ref=e105]: Workshop, tire, cleaning, inspection, parts, and Rescue 24/7 services.
                  - listitem [ref=e106]: CMS, Account & Customer, customer PWA, customer account, digital service book, customer benefits, and reminder system.
              - generic [ref=e107]:
                - heading "3. Personal Data We Collect" [level=2] [ref=e108]
                - paragraph [ref=e109]: We collect data directly from the customer, from services used by the customer, from service entries made by Mitra Auto staff, from payment providers, from transport and service partners, and from technical systems. We collect only data needed for defined purposes.
                - list [ref=e110]:
                  - listitem [ref=e111]: "Identification and contact details: name, email, phone number, address, language, and customer identifiers."
                  - listitem [ref=e112]: "Account data: customer account identifier, login data, role, access rights, account status, consents, and notification settings."
                  - listitem [ref=e113]: "Vehicle data: license plate, vehicle name, make, model, VIN, tire and rim data, storage data, and mileage where needed for services or reminders."
                  - listitem [ref=e114]: "Booking and scheduling data: appointments, service type, pickup and handover times, changes, and cancellations."
                  - listitem [ref=e115]: "Service history and digital service book: completed work, diagnostics, repairs, parts, oil changes, tire work, cleaning, inspection-related data, recommendations, mileage readings, and staff notes."
                  - listitem [ref=e116]: Order, payment, invoice, and receipt data, including payment data processed through Paytrail.
                  - listitem [ref=e117]: "Rescue 24/7 data: name, phone, location, license plate, emergency service request status, and event log."
                  - listitem [ref=e118]: "Customer benefit data: points, discounts, benefit level, campaigns, redemptions, and rules connected to benefits."
                  - listitem [ref=e119]: "Communications and consents: email, SMS, and customer support history, plus marketing and contact consents."
                  - listitem [ref=e120]: "Technical and security data: IP address, browser, device, cookies, session, logs, errors, audit entries, and information needed for security."
                - paragraph [ref=e121]: GPS location is collected only for emergency service or a location feature expressly requested by the customer.
              - generic [ref=e122]:
                - heading "4. Vehicles, License Plates, and Customer Mapping" [level=2] [ref=e123]
                - paragraph [ref=e124]: A license plate may be personal data when it can be connected to an identifiable person, business contact, customer account, or service history. Mitra Auto therefore processes license plates and vehicle mappings according to GDPR principles.
                - list [ref=e125]:
                  - listitem [ref=e126]: A private customer may have one or several vehicles connected to the customer account.
                  - listitem [ref=e127]: A business or fleet customer may have several vehicles and license plates under the same customer group.
                  - listitem [ref=e128]: Bookings, orders, emergency requests, receipts, pickup details, and service history may be linked to a customer profile using email, phone number, customer identifier, or license plate.
                  - listitem [ref=e129]: If a license plate or other identifier gives an uncertain or conflicting match, the mapping is reviewed by staff before the data is shown to a customer.
              - generic [ref=e130]:
                - heading "5. Legal Bases for Processing" [level=2] [ref=e131]
                - paragraph [ref=e132]: We process personal data under GDPR Article 6. The same category of data may be needed under different legal bases in different situations.
                - list [ref=e133]:
                  - listitem [ref=e134]:
                    - strong [ref=e135]: "Contract performance:"
                    - text: bookings, maintenance, repairs, tire services, orders, payments, pickup, customer account, and digital service book.
                  - listitem [ref=e136]:
                    - strong [ref=e137]: "Legal obligation:"
                    - text: accounting, taxation, consumer protection, warranty and liability matters, complaints, and authority requests.
                  - listitem [ref=e138]:
                    - strong [ref=e139]: "Legitimate interest:"
                    - text: customer relationship management, safe service delivery, data integrity, abuse prevention, review of license-plate mappings, internal auditing, and service development.
                  - listitem [ref=e140]:
                    - strong [ref=e141]: "Consent:"
                    - text: marketing, optional benefit messages, analytics cookies, optional location functionality, and other situations where consent is required by law.
                - paragraph [ref=e142]: Where processing is based on legitimate interest, we assess necessity, the effect on the customer, and reasonable expectations. The customer may object to such processing under GDPR.
              - generic [ref=e143]:
                - heading "6. Purposes of Processing" [level=2] [ref=e144]
                - paragraph [ref=e145]: "We use personal data for the following purposes:"
                - list [ref=e146]:
                  - listitem [ref=e147]: to provide services, bookings, orders, payments, invoices, and receipts;
                  - listitem [ref=e148]: to display the customer PWA, customer account, vehicle list, digital service book, and customer benefits;
                  - listitem [ref=e149]: to match customer data using license plate, email, phone number, or customer identifier;
                  - listitem [ref=e150]: to show the next appointment, possible service date, pickup, handover, and work progress;
                  - listitem [ref=e151]: to send service reminders, pickup notices, payment notices, security messages, and customer support messages;
                  - listitem [ref=e152]: to manage customer benefits, points, discounts, offers, and campaigns;
                  - listitem [ref=e153]: to handle complaints, correction requests, warranties, liability matters, and authority matters;
                  - listitem [ref=e154]: for security, access control, abuse prevention, logging, and auditing;
                  - listitem [ref=e155]: to improve service quality, inventory, resources, schedules, and customer experience.
              - generic [ref=e156]:
                - heading "7. Customer Account, PWA, and Digital Service Book" [level=2] [ref=e157]
                - paragraph [ref=e158]: The customer account and PWA show data that Mitra Auto has linked to the customer, customer group, or vehicle. Visible data may include upcoming appointments, service intake, pickup and handover, possible next service date, service history, service recommendations, and customer benefits.
                - list [ref=e159]:
                  - listitem [ref=e160]: The digital service book may include maintenance and repair work, replaced parts, tire work, cleaning work, inspection entries, mileage readings, and recommendations.
                  - listitem [ref=e161]: The next possible service date or reminder may be created from service history, mileage, vehicle data, previous work, or staff assessment.
                  - listitem [ref=e162]: Customer benefit data may include points, discounts, campaigns, benefit levels, and conditions of use.
                - paragraph [ref=e163]: Customer account data does not replace official receipts, invoices, warranty terms, or authority registers.
              - generic [ref=e164]:
                - heading "8. Automated Matching, Suggestions, and Human Review" [level=2] [ref=e165]
                - paragraph [ref=e166]: Mitra Auto may use rule-based automated matching so bookings, orders, receipts, emergency requests, and service history can be linked to the correct customer profile. Matching may be based on a unique email, unique license plate, customer identifier, or confirmed business or fleet list.
                - paragraph [ref=e167]: Uncertain matches, conflicts, duplicate license plates, and mappings between several customers are directed to staff review. Staff may approve, reject, correct, unlink, merge, or anonymize the mapping.
                - paragraph [ref=e168]: This matching is not automated decision-making under GDPR Article 22 that would produce legal effects or similarly significant effects for the customer.
              - generic [ref=e169]:
                - heading "9. Sharing and Processors" [level=2] [ref=e170]
                - paragraph [ref=e171]: We do not sell personal data. We disclose or make personal data available for processing only where needed for the service, law, security, or a customer request.
                - list [ref=e172]:
                  - listitem [ref=e173]: payment providers, banks, accounting, and invoicing services;
                  - listitem [ref=e174]: IT, hosting, database, email, SMS, analytics, and security service providers, including Microsoft Clarity based on consent;
                  - listitem [ref=e175]: parts, tire, towing, transport, inspection, and other service partners to the extent required by the service;
                  - listitem [ref=e176]: authorities, insurance companies, consumer advice, debt collection services, or courts where required by law, legal claim, or contract;
                  - listitem [ref=e177]: named contacts of a business or fleet customer where processing concerns that customer group vehicles or services.
                - paragraph [ref=e178]: We use agreements with personal data processors that limit processing to Mitra Auto instructions and require appropriate security.
              - generic [ref=e179]:
                - heading "10. International Transfers" [level=2] [ref=e180]
                - paragraph [ref=e181]: We aim to use service providers located in the EU or EEA. If personal data is transferred outside the EU or EEA, we use GDPR safeguards such as European Commission Standard Contractual Clauses, transfer impact assessment, and technical and organizational protections from the provider.
              - generic [ref=e182]:
                - heading "11. Retention" [level=2] [ref=e183]
                - paragraph [ref=e184]: We retain personal data only for as long as needed for the processing purpose, contract, law, liability period, warranty, complaint, accounting, or legal claim. When data is no longer needed, we delete or anonymize it within a reasonable time.
                - list [ref=e185]:
                  - listitem [ref=e186]: Accounting, invoice, and receipt data is generally retained for the period required by accounting law.
                  - listitem [ref=e187]: Service, repair, warranty, and complaint data is retained for as long as it may be needed for service history, warranty, liability, or legal claims.
                  - listitem [ref=e188]: Customer account and PWA data is retained during the customer relationship and afterward only where required by law, contract, or legitimate interest.
                  - listitem [ref=e189]: Marketing consents and opt-outs are retained for as long as needed to prove the consent or opt-out.
                  - listitem [ref=e190]: Technical logs and audit data are retained for a limited time for security, error investigation, and abuse prevention.
              - generic [ref=e191]:
                - heading "12. Security and Access Control" [level=2] [ref=e192]
                - paragraph [ref=e193]: We protect personal data with technical and organizational measures. CMS and Account & Customer access is granted only to staff who need the data for work duties.
                - list [ref=e194]:
                  - listitem [ref=e195]: Super Admin may manage CMS access rights, roles, visibility, and staff accounts.
                  - listitem [ref=e196]: Admin and supervisor access is limited to customer, booking, order, and service data needed for the role.
                  - listitem [ref=e197]: We use login controls, role-based permissions, session management, logging, auditing, and access removal where needed.
                  - listitem [ref=e198]: Personal data breaches are handled under GDPR, and we notify the supervisory authority and data subjects where required by law.
              - generic [ref=e199]:
                - heading "13. Communications, Reminders, and Marketing" [level=2] [ref=e200]
                - paragraph [ref=e201]: We send service-related messages such as booking confirmations, schedule changes, pickup notices, payment links, security messages, service questions, and customer support messages. These messages are necessary to provide the service and are generally not marketing.
                - paragraph [ref=e202]: Service reminders may be sent based on contract, legitimate interest, or consent depending on the message content. Marketing, benefit messages, and optional campaign messages are sent only on a lawful basis, and the customer may opt out.
              - generic [ref=e203]:
                - heading "14. GDPR Rights" [level=2] [ref=e204]
                - paragraph [ref=e205]: Customers and other data subjects have rights under GDPR. These rights also apply to vehicle and license-plate mappings where the data can be connected to an identifiable person.
                - list [ref=e206]:
                  - listitem [ref=e207]:
                    - strong [ref=e208]: "Access:"
                    - text: the right to know whether we process personal data and to receive a copy of the data.
                  - listitem [ref=e209]:
                    - strong [ref=e210]: "Rectification:"
                    - text: the right to correct inaccurate or incomplete data, including vehicle and license-plate mappings.
                  - listitem [ref=e211]:
                    - strong [ref=e212]: "Erasure and anonymization:"
                    - text: the right to request deletion where there is no legal, contractual, or other lawful ground for retention.
                  - listitem [ref=e213]:
                    - strong [ref=e214]: "Restriction:"
                    - text: the right to request restriction, for example while data accuracy is reviewed.
                  - listitem [ref=e215]:
                    - strong [ref=e216]: "Portability:"
                    - text: the right to receive data provided by the customer in a structured and machine-readable format where the conditions are met.
                  - listitem [ref=e217]:
                    - strong [ref=e218]: "Objection:"
                    - text: the right to object to processing based on legitimate interest and to direct marketing.
                  - listitem [ref=e219]:
                    - strong [ref=e220]: "Withdraw consent:"
                    - text: the right to withdraw consent at any time without affecting processing carried out before withdrawal.
                  - listitem [ref=e221]:
                    - strong [ref=e222]: "Complaint:"
                    - text: the right to lodge a complaint with the Finnish Data Protection Ombudsman.
                - paragraph [ref=e223]: Requests may be sent to contact@mitra-auto.fi. We may ask for additional information to verify identity and find the correct customer or vehicle mapping.
              - generic [ref=e224]:
                - heading "15. Cookies and Technical Tracking" [level=2] [ref=e225]
                - paragraph [ref=e226]: We use essential cookies and similar technical data to provide the website, login, shopping cart, session, security, and PWA functionality. We may use analytics or marketing cookies only where there is a lawful basis and consent where required.
                - list [ref=e227]:
                  - listitem [ref=e228]:
                    - strong [ref=e229]: "Essential cookies:"
                    - text: needed for technical operation and security of the service.
                  - listitem [ref=e230]:
                    - strong [ref=e231]: "Preference cookies:"
                    - text: remember choices such as language or interface settings.
                  - listitem [ref=e232]:
                    - strong [ref=e233]: "Analytics (Microsoft Clarity):"
                    - text: used to improve site usage, booking, and webshop experience only lawfully and with consent where required.
                - paragraph [ref=e234]: Browser settings may limit cookies, but blocking essential cookies may prevent some services from working.
              - generic [ref=e235]:
                - heading "16. Children" [level=2] [ref=e236]
                - paragraph [ref=e237]: Mitra Auto services are intended mainly for vehicle owners, holders, drivers, business customers, and adults. We do not knowingly collect personal data of children without involvement of a guardian or other legal representative.
              - generic [ref=e238]:
                - heading "17. Changes and Effective Version" [level=2] [ref=e239]
                - paragraph [ref=e240]: We may update this Privacy Policy when services, systems, law, or processing practices change. We publish the current version on the website and keep previous versions as version history.
                - paragraph [ref=e241]: This release adds Microsoft Clarity analytics, cookie consent, and analytics processor information.
                - paragraph [ref=e242]: "Current version: Privacy Policy v6.0"
                - paragraph [ref=e243]: "Effective date: 22 June 2026"
