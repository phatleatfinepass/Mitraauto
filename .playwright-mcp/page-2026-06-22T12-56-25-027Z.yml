              - generic [ref=e303]:
                - heading "4. Customer Account, Access, and Security" [level=2] [ref=e304]
                - paragraph [ref=e305]: The customer account is intended to make customer service use easier. The customer may see data connected to the account, customer group, or vehicle, such as upcoming bookings, pickup and handover details, service history, possible service dates, reminders, and customer benefits.
                - list [ref=e306]:
                  - listitem [ref=e307]: The customer is responsible for secure use of login credentials and must notify Mitra Auto of suspected misuse.
                  - listitem [ref=e308]: Mitra Auto may limit, suspend, or close a customer account where needed for security, abuse prevention, inaccurate data, unpaid receivables, or legal compliance.
                  - listitem [ref=e309]: Business and fleet customer users, roles, and vehicle lists may be confirmed based on a named contact person or separate agreement.
              - generic [ref=e310]:
                - heading "5. Vehicles, License Plates, and Customer Mapping" [level=2] [ref=e311]
                - paragraph [ref=e312]: The customer is responsible for the accuracy of contact details, vehicle data, license plates, and business or fleet lists, and for having the right to use or manage the vehicle in the service.
                - list [ref=e313]:
                  - listitem [ref=e314]: Mitra Auto may connect bookings, orders, receipts, emergency requests, pickup details, schedules, and service history to a customer profile using email, phone number, customer identifier, or license plate.
                  - listitem [ref=e315]: If a mapping is incorrect, the customer must notify Mitra Auto. Mitra Auto will correct, unlink, or anonymize the incorrect mapping within a reasonable time.
                  - listitem [ref=e316]: Management of several vehicles, a company, or a fleet group does not change vehicle ownership, liability, or insurance terms.
              - generic [ref=e317]:
                - heading "6. Bookings, Schedules, Pickup, and Cancellations" [level=2] [ref=e318]
                - paragraph [ref=e319]: A booking is the customer request for a service time. A binding agreement is formed when Mitra Auto confirms the booking, starts the work, accepts an order, or gives an offer accepted by the customer. Estimated times are not guarantees of completion time unless expressly agreed.
                - list [ref=e320]:
                  - listitem [ref=e321]: The customer must deliver the vehicle at the agreed time and provide necessary information, keys, lock codes, or approvals for the work.
                  - listitem [ref=e322]: Mitra Auto may reschedule where work, parts, safety, weather, staffing, or another justified reason requires it.
                  - listitem [ref=e323]: Cancellation or change must be made as early as possible. Repeated no-shows or late cancellations may be charged for reasonable costs where permitted by law.
              - generic [ref=e324]:
                - heading "7. Orders, Prices, Payments, and Invoicing" [level=2] [ref=e325]
                - paragraph [ref=e326]: Prices are stated in euros. Consumer prices include VAT unless otherwise stated. Business customer prices may show VAT separately. The final price may change if work scope, parts, vehicle condition, or customer-approved additional work changes.
                - list [ref=e327]:
                  - listitem [ref=e328]: Payments may be handled online, by invoice, payment link, payment provider, or another method accepted by Mitra Auto.
                  - listitem [ref=e329]: Mitra Auto may require advance payment, prepayment of parts, credit check, or payment before vehicle handover.
                  - listitem [ref=e330]: Unpaid invoices may incur late interest, reminder fees, and collection costs as permitted by law.
              - generic [ref=e331]:
                - heading "8. Tire Hotel and Storage Services" [level=2] [ref=e332]
                - paragraph [ref=e333]: Tire hotel and other storage services apply to customer tires, rims, or other separately agreed products. Storage period, price, pickup, change, and possible additional services are determined by booking, order, or separate agreement.
                - list [ref=e334]:
                  - listitem [ref=e335]: The customer is responsible for ensuring stored products are lawful, identifiable, and suitable for the service.
                  - listitem [ref=e336]: Mitra Auto may inspect tire condition and notify the customer if tires are not safe or legal to use.
                  - listitem [ref=e337]: Unclaimed, unpaid, or unidentified products may be subject to separate storage, notice, and handling terms within the limits permitted by law.
