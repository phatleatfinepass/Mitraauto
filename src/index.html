<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11141A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mitra Auto" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icons/app-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/app-icon.svg" />
    <title>Mitra Auto Website Outline</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { background: #f5f2eb; color: #11141a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #root { height: 100%; }
      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top right, rgba(255, 107, 53, 0.12), transparent 34%),
          linear-gradient(180deg, #f8f4ed 0%, #f2ede4 100%);
        transition: opacity 220ms ease, visibility 220ms ease;
      }
      #app-boot[data-hidden="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-shell {
        width: min(320px, calc(100vw - 40px));
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .boot-mark {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: #11141a;
        color: #ff6b35;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.04em;
        box-shadow: 0 18px 40px rgba(17, 20, 26, 0.14);
      }
      .boot-title {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        line-height: 1;
      }
      .boot-copy {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
        color: rgba(17, 20, 26, 0.72);
      }
      .boot-rail {
        overflow: hidden;
        height: 4px;
        border-radius: 999px;
        background: rgba(17, 20, 26, 0.08);
      }
      .boot-bar {
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff6b35 0%, #ff8d62 100%);
        animation: boot-slide 1.1s ease-in-out infinite;
      }
      @keyframes boot-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(260%); }
      }
    </style>
  </head>

  <body>
    <div id="app-boot" aria-hidden="true">
      <div class="boot-shell">
        <div class="boot-mark">MA</div>
        <div>
          <p class="boot-title">Mitra Auto</p>
          <p class="boot-copy">Loading garage services and booking tools.</p>
        </div>
        <div class="boot-rail">
          <div class="boot-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
