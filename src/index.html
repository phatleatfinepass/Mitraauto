
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#11141A" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="apple-mobile-web-app-title" content="Mitra CMS" />
      <link rel="manifest" href="/manifest.webmanifest" />
      <title>Mitra Auto CMS</title>
      <style>
        :root {
          color-scheme: light;
        }

        html,
        body {
          margin: 0;
          min-height: 100%;
          background: #fafafa;
          color: #1d1d1f;
          font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        }

        #boot-splash {
          min-height: 100dvh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background: linear-gradient(180deg, #fafafa 0%, #f3f4f6 100%);
        }

        #boot-splash[data-cms="true"] {
          background: #11141a;
          color: #f5f5f7;
        }

        .boot-splash__panel {
          width: min(100%, 420px);
          display: flex;
          flex-direction: column;
          gap: 14px;
          text-align: left;
        }

        .boot-splash__mark {
          width: 48px;
          height: 48px;
          border-radius: 14px;
          background: #ff6b35;
          box-shadow: 0 14px 40px rgba(255, 107, 53, 0.2);
        }

        .boot-splash__title {
          font-size: 28px;
          font-weight: 700;
          letter-spacing: -0.02em;
        }

        .boot-splash__text {
          max-width: 24rem;
          font-size: 15px;
          line-height: 1.5;
          color: rgba(29, 29, 31, 0.68);
        }

        .boot-splash__bar {
          position: relative;
          width: 100%;
          height: 4px;
          overflow: hidden;
          border-radius: 999px;
          background: rgba(29, 29, 31, 0.08);
        }

        .boot-splash__bar::after {
          content: "";
          position: absolute;
          inset: 0 auto 0 0;
          width: 42%;
          border-radius: inherit;
          background: linear-gradient(90deg, #ff6b35 0%, #ff8c61 100%);
          animation: boot-progress 1.15s ease-in-out infinite;
        }

        .boot-splash__hint {
          font-size: 12px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: rgba(29, 29, 31, 0.44);
        }

        #boot-splash[data-cms="true"] .boot-splash__text {
          color: rgba(245, 245, 247, 0.7);
        }

        #boot-splash[data-cms="true"] .boot-splash__bar {
          background: rgba(245, 245, 247, 0.14);
        }

        #boot-splash[data-cms="true"] .boot-splash__hint {
          color: rgba(245, 245, 247, 0.44);
        }

        @keyframes boot-progress {
          0% {
            transform: translateX(-120%);
          }
          100% {
            transform: translateX(270%);
          }
        }

        @media (max-width: 767px) {
          #boot-splash {
            align-items: flex-start;
            justify-content: flex-start;
            padding: 32px 20px 24px;
          }

          .boot-splash__panel {
            width: 100%;
            max-width: 22rem;
            padding-top: 12vh;
          }

          .boot-splash__title {
            font-size: 32px;
          }
        }
      </style>
    </head>

    <body>
      <div id="root">
        <div id="boot-splash">
          <div class="boot-splash__panel">
            <div class="boot-splash__mark" aria-hidden="true"></div>
            <div class="boot-splash__title">Mitra Auto</div>
            <div class="boot-splash__text">Preparing the fastest route into the site. This should only take a moment.</div>
            <div class="boot-splash__bar" aria-hidden="true"></div>
            <div class="boot-splash__hint">Loading</div>
          </div>
        </div>
      </div>
      <script>
        const splash = document.getElementById('boot-splash');
        if (splash && window.location.pathname.startsWith('/cms')) {
          splash.setAttribute('data-cms', 'true');
          const title = splash.querySelector('.boot-splash__title');
          const text = splash.querySelector('.boot-splash__text');
          if (title) title.textContent = 'Mitra CMS';
          if (text) text.textContent = 'Opening the mobile workboard and restoring your admin session.';
        }
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
